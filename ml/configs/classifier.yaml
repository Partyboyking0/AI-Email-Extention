model_name: distilbert-base-uncased
output_dir: ml/artifacts/classifier
labels:
  - urgent
  - follow-up
  - action-required
  - low-priority
  - finance
  - newsletter
  - opportunity
  - spam
  - work
  - personal
training:
  learning_rate: 0.00002
  batch_size: 32
  num_epochs: 3
  weight_decay: 0.01
data:
  train_file: ml/data/raw/classifier_demo.jsonl
  text_column: text
  label_column: label
target:
  f1_macro: 0.88
